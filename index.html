<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog mclaren</title>
    <style>
        /* Estilizando o corpo da página para não ficar totalmente branco */
        body {
            background-color: #F8F9FA;
            font-family: Arial, sans-serif; /* Muda a fonte para uma mais moderna */
            margin: 0;
            padding: 0;
        }

        /* O cabeçalho ganha o laranja marcante da McLaren */
        h1 {
            background-color: #FF8700; /* Laranja Papaia */
            color: #1E1E1E;            /* Texto cinza quase preto para dar contraste */
            text-align: center;
            margin: 0;
            padding: 20px;             /* Adiciona um espaço interno para o texto respirar */
        }

        /* O conteúdo principal fica centralizado e limitado em telas grandes */
        body > p, h2, h2 + p {
            max-width: 800px;
            margin: 20px auto;         /* Margem de 20px em cima/baixo e auto nas laterais */
            text-align: center;
        }

        /* Um toque especial para o título de Curiosidades */
        h2 {
            color: #FF8700;            /* Texto em laranja */
            border-bottom: 2px solid #1E1E1E; /* Uma linha fina abaixo do título */
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <h1>blog mclaren</h1>
    <p>Vou compartilhar conhecimentos sobre a mclaren.</p>
    
    <h2>Curiosidades</h2>
    <p>Aqui vão aparecer informaçoes sobre essa equipe da f1!</p>
</body>
</html>
